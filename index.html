<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATI[UCV]Log 2026-1</title>
    <link rel="icon" type="image/x-icon" href="cropped-logonuevo-32x32.png">
    <style>
       
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4; 
            text-align: center;
        }

        .navbar {
            background-color: #4482c3; 
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 40px;
        }

        .logo {
            font-weight: bold;
            font-size: 28px;
            display: flex;
            align-items: center;
        }

        .ucv {
            font-size: 14px; 
            background: rgba(255,255,255,0.2);
            padding: 2px 4px;
            margin: 0 4px;
            border-radius: 3px;
        }

        .search-bar {
            background: white;
            border-radius: 20px;
            display: flex;
            overflow: hidden;
            width: 35%;
        }

        .search-bar input {
            border: none;
            padding: 8px 15px;
            flex-grow: 1;
            outline: none;
        }

        .search-bar button {
            background-color: #1a3a5a;
            color: white;
            border: none;
            padding: 0 15px;
            cursor: pointer;
        }

        .user-icon img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .titulo-semestre {
            text-align: left;
            padding: 20px 40px;
            margin: 0;
        }

        .student-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 25px;
            padding: 20px 40px;
        }

        .student-card {
            text-decoration: none;
            color: black;
            background: white; 
            border-radius: 12px; 
            overflow: hidden;
            border: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .student-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            background-color: #1e2a38; 
        }

        .info {
            padding: 15px;
            text-align: left;
        }

        .info p {
            margin: 0 0 10px 0;
            font-weight: bold;
        }

        .blue-bar {
            height: 10px;
            background-color: #70a1d7;
            border-radius: 5px;
        }

        .student-card:hover {
            transform: scale(1.05) rotate(-3deg); 
            z-index: 10;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        .student-card:hover .blue-bar {
            background-color: #007bff; 
        }

        footer {
            margin-top: 20px;
            padding: 20px;
            border-top: 1px solid #ccc;
            color: #777;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                ATI <span class="ucv">[UCV]</span> Log
            </div>
            <form class="search-bar">
                <input type="text" placeholder="Nombre...">
                <button type="submit">Buscar</button>
            </form>
            <div class="user-icon">
                <img src="https://i.pinimg.com/1200x/5e/39/6b/5e396bb1b17681759922dd10f8a9d702.jpg" alt="Usuario">  <!-- yo aqui puse una imagen de internet porque la que sale en el reto 1 no me quiere agarrar -->
            </div>
        </nav>
    </header>

    <h2 class="titulo-semestre">Semestre 2026-1</h2>

    <section class="student-grid">
        <div class="student-card">
        <!-- yoooooooooooooooo-->
            <img src="30370544.jpeg" alt="Estudiante">
            <div class="info">
                <p>Genesis Montilla</p>
                <div class="blue-bar"></div>
            </div>
             </div>
       

        <div class="student-card">
            <img src="Dummy1.png" alt="Estudiante">
            <div class="info">
                <p>Dayannis Colmenares</p>
                <div class="blue-bar"></div>
            </div>
        </div>

        <div class="student-card">
            <img src="Dummy2.png" alt="Estudiante">
            <div class="info">
                <p>Jesus Marcano</p>
                <div class="blue-bar"></div>
            </div>
        </div>

        <div class="student-card">
            <img src="Dummy3.png" alt="Estudiante">
            <div class="info">
                <p>Mauricio Gonzalez</p>
                <div class="blue-bar"></div>
            </div>
        </div>

        <div class="student-card">
            <img src="Dummy4.png" alt="Estudiante">
            <div class="info">
                <p>Maria Laura</p>
                <div class="blue-bar"></div>
            </div>
        </div>

        <div class="student-card">
            <img src="Dummy5.png" alt="Estudiante">
            <div class="info">
                <p>Carlos Yepez</p>
                <div class="blue-bar"></div>
            </div>
        </div>
    </section>

    <footer>
        <p>Copyright © 2026 Escuela de computación - ATI. Todos los derechos reservados</p>
    </footer>

</body>
</html>
