<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Génesis Montilla</title>
    <link rel="icon" sizes="32x32" href="../icon/cropped-logonuevo-32x32.png">
    <link rel="icon" sizes="192x192" href="../icon/cropped-logonuevo-192x192.png">
    <link rel="stylesheet" href="../css/style.css">

   
    <script src="js/profile.js" defer></script>


</head>

<body>



    <div>
        <header>
            <nav class="navbar">
                <a href="../index.html">
                    <div class="logo">
                        ATI <span class="ucv">[UCV]</span> Log
                    </div>

                </a>


                <form class="search-bar" media="(min-width: 320px) and (max-width: 768px)">
                    <input id="busqueda" class="search-input" type="text" placeholder="Nombre...">
                    <button id="boton-busqueda"type="submit">Buscar</button>
                </form>

                
                <img class="user-img" src="../icon/userIcon.svg" alt="Usuario">


                <div class="menu"><img src="../icon/menuIcon.svg" alt="menuhamburguesa"></div>


            </nav>
        </header>


        <section id="profilesection">


            <div class="contenedor-imagen">

                <picture>

                    
                    
                    <img src="" alt="Foto de perfil" id="profile-picture" class="imagen-perfil" loading="lazy">

                </picture>
            </div>
          <div id="myinfo">

            <h1 id="nombre" class="fila-info"></h1>

            <p id="descripcion" class="fila-info"></p>
            <p id="color" class="fila-info"></p>
            <p id="libro" class="fila-info"></p>
            <p id="musica" class="fila-info"></p>
            <p id="videojuego" class="fila-info"></p>
            <p id="lenguajes" class="fila-info"></p>
            <p id="email" class="fila-info"></p>
            <p id="ci" class="fila-info"></p>
            <p id="genero" class="fila-info"></p>
            <p id="cumpleaños" class="fila-info"></p>
                
            </div>

        <footer>
